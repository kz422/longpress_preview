name: flutter_longpress_preview
description: A Flutter widget that shows a preview popup on long press, similar to Safari link preview and Instagram peek. Supports any widget, URL OGP preview, and image zoom.
version: 0.1.8
homepage: https://github.com/kz422/flutter_longpress_preview
repository: https://github.com/kz422/flutter_longpress_preview
issue_tracker: https://github.com/kz422/flutter_longpress_preview/issues

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

screenshots:
  - description: 'Widget preview with context menu actions'
    path: screenshots/preview_with_context_menu.gif
  - description: 'OGP link preview'
    path: screenshots/links_preview.gif
  - description: 'Image preview on long press'
    path: screenshots/images_preview.gif

flutter:
